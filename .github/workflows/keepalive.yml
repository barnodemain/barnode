name: Supabase Keepalive

# Guardiano di RISERVA: tiene attivo il progetto Supabase Free (pausa dopo ~7 giorni di inattività).
# Il guardiano PRINCIPALE è cron-job.org (ping giornaliero, con notifica email su fallimento).
# Questo workflow è la ridondanza: lettura minima ogni giorno, con retry. Nessuna scrittura, payload minimo.
# Disattivazione: disabilita questo workflow dalla tab Actions del repo, o eliminalo.

on:
  schedule:
    # ogni giorno alle 06:00 UTC (la pausa scatta dopo 7gg: ampio margine + ridondanza con cron-job.org)
    - cron: '0 6 * * *'
  workflow_dispatch:        # consente l'avvio manuale dalla tab Actions

permissions:
  contents: read

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Ping Supabase REST (lettura minima 1 riga, con retry)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::Secret SUPABASE_URL o SUPABASE_ANON_KEY mancanti."
            exit 1
          fi
          # 3 tentativi a distanza crescente: gestisce intoppi momentanei e risveglio DB
          for attempt in 1 2 3; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 \
              "${SUPABASE_URL}/rest/v1/articoli?select=id&limit=1" \
              -H "apikey: ${SUPABASE_ANON_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
            echo "Tentativo $attempt: HTTP $code"
            # 2xx = ok; qualsiasi 2xx tiene sveglio il DB
            if [ "$code" -ge 200 ] && [ "$code" -lt 300 ]; then
              echo "Keepalive OK: Supabase attivo."
              exit 0
            fi
            echo "Tentativo $attempt fallito (HTTP $code), attendo prima di riprovare..."
            sleep $((attempt * 15))
          done
          echo "::error::Keepalive fallito dopo 3 tentativi."
          exit 1
